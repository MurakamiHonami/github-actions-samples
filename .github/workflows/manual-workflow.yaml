# workflow の名前です。実行時に表示される
name: Manual workflow 2

# on: アクションが実行されるタイミングを指定
on:
  # 「workflow_dispatch」を指定すると、GitHub上で手動実行できる
  workflow_dispatch:
    # 手動実行時に入力する値を設定
    inputs:
      # 入力項目「name」を設定
      name:
        # 'name' の入力項目のプレースホルダー
        description: 'Person to greet'
        # 明示的に値が提供されない場合のデフォルト値
        default: 'World'
        # ワークフローを実行するために入力が必要
        required: true
        # 入力のデータタイプ
        type: string
      is-set-farewell-message:
        # 'is-set-farewell-message' のチェックボックスの横に表示される文字
        description: 'Set farewell message'
        # 任意の入力項目
        required: false
        # 入力のデータタイプ
        type: boolean

# job: この workflow で実行される処理を記載
jobs:
  greet:
    runs-on: ubuntu-latest

    steps:
    - name: Send greeting
      run: echo "Hello ${{ inputs.name }}"

  # 「farewell」という2つ目の job を用意
  farewell:
    runs-on: ubuntu-latest

    steps:
    - name: Send farewell
      if: ${{ inputs.is-set-farewell-message }}
      run: echo "Goodbye ${{ inputs.name }}"
